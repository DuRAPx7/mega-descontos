name: Mega Descontos Bot

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Acordar site e executar bot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail-with-body \
            --retry 3 \
            --retry-delay 20 \
            --max-time 300 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            https://mega-descontos.onrender.com/api/cron/run
