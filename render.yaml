services:
  - type: web
    name: mega-descontos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AMAZON_ASSOCIATE_TAG
        sync: false
      - key: MERCADOLIVRE_AFFILIATE_ID
        sync: false
      - key: MAGALU_PARTNER_ID
        sync: false
      - key: SHOPEE_AFFILIATE_ID
        sync: false
      - key: SHOPEE_APP_ID
        sync: false
      - key: SHOPEE_API_SECRET
        sync: false
      - key: SHOPEE_API_MAX_PAGES
        value: "2"
      - key: RUN_INTERNAL_SCHEDULER
        value: "false"
      - key: CLOUD_AUTOMATION
        value: "false"
      - key: CLOUD_AGENT_TIMEOUT_SECONDS
        value: "120"
      - key: PUBLIC_SITE_URL
        value: "https://mega-descontos.onrender.com"
      - key: MAGALU_STORE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: ALIEXPRESS_AFFILIATE_ID
        sync: false
