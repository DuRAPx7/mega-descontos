<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Entrar - Mega Descontos</title>
    <script src="theme.js"></script>
    <link rel="icon" type="image/x-icon" href="favicon.ico?v=20260620-3">
    <link rel="apple-touch-icon" href="assets/mega-descontos-icon.png">
    <link rel="stylesheet" href="styles.css?v=20260628-imagefit-1">
    <link rel="stylesheet" href="admin.css">
  </head>
  <body class="admin-page">
    <main class="login-shell">
      <form class="login-card" id="loginForm">
        <a class="brand" href="index.html" aria-label="Mega Descontos">
          <img class="brand-logo" src="assets/mega-descontos-icon.png?v=20260620-4" alt="" aria-hidden="true">
          <span>
            <strong>MEGA</strong>
            <strong>DESCONTOS</strong>
          </span>
        </a>
        <button class="theme-toggle" type="button" data-theme-toggle>Tema escuro</button>
        <div>
          <p class="admin-kicker">Acesso restrito</p>
          <h1>Entrar no admin</h1>
          <p>Use seu usuario e senha para cadastrar, editar e remover ofertas.</p>
        </div>
        <label>
          Usuario
          <input id="username" type="text" autocomplete="username" required>
        </label>
        <label>
          Senha
          <input id="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-admin-button" type="submit">Entrar</button>
        <p class="import-status" id="loginStatus"></p>
      </form>
    </main>

    <script>window.MegaTheme.init();</script>
    <script src="login.js"></script>
  </body>
</html>
