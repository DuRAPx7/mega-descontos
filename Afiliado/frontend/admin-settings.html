<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Configuracoes - Mega Descontos</title>
    <script src="theme.js"></script>
    <link rel="icon" href="favicon.ico"><link rel="stylesheet" href="styles.css?v=20260705-neon-request-1"><link rel="stylesheet" href="admin.css?v=20260705-admin-dashboard-1">
  </head>
  <body class="admin-page compact-admin" data-admin-page="settings">
    <header class="admin-header"><a class="brand" href="index.html"><img class="brand-logo" src="assets/mega-descontos-icon.png" alt=""><span><strong>MEGA</strong><strong>DESCONTOS</strong></span></a><nav class="admin-sections admin-top-nav"><a href="admin.html"><span>▥</span>Status</a><a href="admin-review.html"><span>▣</span>Revisão</a><a href="admin-offers.html"><span>◇</span>Ofertas</a><a class="active" href="admin-settings.html"><span>⚙</span>Configurações</a></nav><nav class="admin-nav"><a href="index.html" aria-label="Ver site">↗</a><button class="admin-avatar" id="logoutAdmin" type="button" aria-label="Sair">AD</button></nav></header>
    <main class="admin-shell compact-admin-shell">
      <section class="admin-intro"><div><p class="admin-kicker">Painel administrativo</p><h1>Configuracoes do bot</h1><p>Controle a qualidade e a publicacao automatica.</p></div></section>
      <section class="import-panel settings-panel">
        <form id="botSettingsForm" class="settings-grid">
          <label>Desconto minimo (%)<input id="minimumDiscount" type="number" min="1" max="90" required></label>
          <label>Avaliacao minima<input id="minimumRating" type="number" min="0" max="5" step="0.1" required></label>
          <label>Vendas minimas<input id="minimumSales" type="number" min="0" required></label>
          <label>Comissao minima<input id="minimumCommissionRate" type="number" min="0" max="1" step="0.001" required></label>
          <label>Paginas Shopee por execucao<input id="maxPages" type="number" min="1" max="50" required></label>
          <label>Paginas Mercado Livre por execucao<input id="mercadoLivreMaxPages" type="number" min="1" max="20" required></label>
          <label class="setting-toggle"><input id="autoPublishShopee" type="checkbox"><span>Publicar Shopee automaticamente</span></label>
          <label class="setting-toggle"><input id="autoPublishMercadoLivre" type="checkbox"><span>Publicar Mercado Livre automaticamente</span></label>
          <button class="primary-admin-button" type="submit">Salvar configuracoes</button>
        </form><p class="import-status" id="settingsStatus"></p>
      </section>
    </main>
    <script>window.MegaTheme.init();</script><script src="admin-dashboard.js?v=20260705-admin-dashboard-1"></script>
  </body>
</html>
