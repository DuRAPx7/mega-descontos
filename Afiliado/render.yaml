services:
  - type: web
    name: mega-descontos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: AMAZON_ASSOCIATE_TAG
        sync: false
      - key: MERCADOLIVRE_AFFILIATE_ID
        sync: false
      - key: MERCADOLIVRE_ACCESS_TOKEN
        sync: false
      - key: MERCADOLIVRE_CLIENT_ID
        sync: false
      - key: MERCADOLIVRE_CLIENT_SECRET
        sync: false
      - key: MERCADOLIVRE_REDIRECT_URI
        value: https://mega-descontos.onrender.com/api/mercadolivre/callback
      - key: MAGALU_PARTNER_ID
        sync: false
      - key: SHOPEE_AFFILIATE_ID
        sync: false
      - key: ALIEXPRESS_AFFILIATE_ID
        sync: false
